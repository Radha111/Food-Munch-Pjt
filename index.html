<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Food Munch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<header class="navbar">
  <h1>🍴 Food Munch</h1>
  <nav>
    <a href="#menu">Menu</a>
    <a href="#order">Order</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- Hero -->
<section class="hero">
  <h2>Delicious Food, Delivered Fast</h2>
  <p>Fresh • Hot • Hygienic</p>
  <button onclick="scrollToMenu()">Explore Menu</button>
</section>

<!-- Menu -->
<section id="menu" class="menu">
  <h2>Our Popular Dishes</h2>

  <div class="menu-items">

   

    <div class="food-card" onclick="selectFood('Burger')">
      <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
      <h3>Burger</h3>
    </div>

    <div class="food-card" onclick="selectFood('Pasta')">
      <img src="https://images.unsplash.com/photo-1521389508051-d7ffb5dc8a40">
      <h3>Pasta</h3>
    </div>

    <div class="food-card" onclick="selectFood('Salad')">
      <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">
      <h3>Salad</h3>
    </div>

  </div>
</section>

<!-- Order -->
<section id="order" class="order">
  <h2>Place Your Order</h2>
  <input type="text" id="name" placeholder="Your Name">
  <input type="text" id="food" placeholder="Food Item">
  <button onclick="placeOrder()">Submit Order</button>
</section>

<!-- Footer -->
<footer id="contact">
  <p>📍 Amalapuram</p>
  <p>☎ 6305028277</p>
  <p>© 2026 Food Munch</p>
</footer>

<script src="script.js"></script>
</body>
</html>
